name: データ更新（スクレイピング）

# 毎日定期実行＋手動実行。ここでのみスクレイピングし、結果CSVをコミットする。
# CSVが更新されると Render が自動で再デプロイし、サイトに反映される。
on:
  schedule:
    # 1日3回（日本時間 JST = UTC+9）。UTCで指定する。
    - cron: "30 0 * * *"   # 09:30 JST
    - cron: "30 4 * * *"   # 13:30 JST
    - cron: "0 8 * * *"    # 17:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: データ蓄積（スクレイピング）
        env:
          # R2の鍵はGitHubのSecretsに登録（未登録なら添付保存はスキップされる）
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          # Anthropic API（公告テキストのAI要約用。未設定なら生テキストをそのまま格納）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build_dataset.py

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/tenders.csv dataset/update_log.json
          if git diff --staged --quiet; then
            echo "更新なし"
          else
            git pull --rebase origin main
            git commit -m "データ自動更新 $(date -u +%Y-%m-%d)"
            git push
          fi
