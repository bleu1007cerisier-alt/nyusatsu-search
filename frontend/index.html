<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国AI公募ナビ｜官公庁・自治体の公募・入札情報を一元検索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }

    /* カラーパレット: ネイビー基調・アクセントはインディゴ・アンバー */
    :root {
      --c-navy:   #0f172a;
      --c-brand:  #3730a3; /* インディゴ700 */
      --c-accent: #f59e0b; /* アンバー */
      --c-text:   #1e293b;
      --c-muted:  #64748b;
      --c-bg:     #f8fafc;
      --c-card:   #ffffff;
    }

    /* ヘッダー */
    .gradient-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
    }

    /* カード */
    .card-hover { transition: box-shadow .18s ease, border-color .18s ease, transform .12s ease; }
    .card-hover:hover {
      box-shadow: 0 6px 24px rgba(55,48,163,.10);
      border-color: #a5b4fc;
      transform: translateY(-2px);
    }

    /* 種別バッジ: 2色に絞る */
    .badge-nyusatsu { background:#ede9fe; color:#4338ca; }  /* 入札: インディゴ */
    .badge-proposal { background:#ede9fe; color:#4338ca; }  /* プロポーザル: 同系 */
    .badge-rfi      { background:#fef3c7; color:#b45309; }  /* RFI: アンバー */
    .badge-zuii     { background:#f1f5f9; color:#475569; }  /* 随意: スレート */

    /* AI要約ブロック */
    .summary-block {
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      border-left: 3px solid #818cf8;
    }
    .summary-text { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* フィルタパネル */
    @media (max-width: 640px) {
      #filter-panel { display: none; }
      #filter-panel.open { display: flex; }
    }

    /* 状態ボタン active */
    .status-btn-active { background: #3730a3; color: #fff; border-color: #3730a3; }
    .status-btn { background: #fff; color: #334155; border-color: #e2e8f0; }
    .status-btn:hover { background: #f8fafc; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- ヘッダー -->
  <header class="gradient-header text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
      <div>
        <a href="/" class="block">
          <div class="flex items-center gap-2">
            <span class="text-2xl">🧭</span>
            <div>
              <h1 class="text-2xl font-bold tracking-tight leading-none">全国AI公募ナビ</h1>
              <p class="text-blue-200 text-xs mt-0.5 tracking-wide">KOUBO NAVI</p>
            </div>
          </div>
          <p class="text-blue-200 text-xs mt-1.5">官公庁・自治体の公募・入札情報を全国網羅・AI でナビゲート</p>
        </a>
      </div>
      <div class="flex items-center gap-4">
        <div id="stats-badge" class="text-right text-sm text-blue-100 hidden sm:block"></div>
        <a href="/dev" class="text-xs text-blue-200 hover:text-white border border-blue-400 hover:border-white rounded-lg px-3 py-1.5 transition-colors">🛠️ 開発者</a>
      </div>
    </div>
  </header>

  <!-- 検索エリア -->
  <div class="bg-white border-b shadow-sm sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3">

      <!-- キーワード + 検索ボタン (常時表示) -->
      <div class="flex gap-2">
        <input id="q" type="text" placeholder="キーワードで検索（例：システム開発、脱炭素、委託）"
          class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50"
          onkeydown="if(event.key==='Enter') search()">
        <button onclick="search()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition shrink-0">
          🔍 検索
        </button>
        <!-- スマホ: 絞り込みトグル -->
        <button onclick="toggleFilter()"
          class="sm:hidden border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600 px-3 py-2.5 rounded-xl text-sm transition shrink-0">
          ⚙️
        </button>
      </div>

      <!-- フィルターパネル (PC: 常時, スマホ: トグル) -->
      <div id="filter-panel" class="flex flex-wrap gap-2 mt-2.5">
        <!-- 種別 -->
        <select id="category" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">すべての種別</option>
          <option value="入札">入札</option>
          <option value="プロポーザル">プロポーザル</option>
          <option value="RFI">RFI</option>
          <option value="随意契約">随意契約</option>
        </select>

        <!-- 都道府県 -->
        <select id="prefecture" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">すべての地域</option>
          <option value="国">国（省庁）</option>
          <option value="北海道">北海道</option><option value="青森県">青森県</option>
          <option value="岩手県">岩手県</option><option value="宮城県">宮城県</option>
          <option value="秋田県">秋田県</option><option value="山形県">山形県</option>
          <option value="福島県">福島県</option><option value="茨城県">茨城県</option>
          <option value="栃木県">栃木県</option><option value="群馬県">群馬県</option>
          <option value="埼玉県">埼玉県</option><option value="千葉県">千葉県</option>
          <option value="東京都">東京都</option><option value="神奈川県">神奈川県</option>
          <option value="新潟県">新潟県</option><option value="富山県">富山県</option>
          <option value="石川県">石川県</option><option value="福井県">福井県</option>
          <option value="山梨県">山梨県</option><option value="長野県">長野県</option>
          <option value="岐阜県">岐阜県</option><option value="静岡県">静岡県</option>
          <option value="愛知県">愛知県</option><option value="三重県">三重県</option>
          <option value="滋賀県">滋賀県</option><option value="京都府">京都府</option>
          <option value="大阪府">大阪府</option><option value="兵庫県">兵庫県</option>
          <option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option>
          <option value="鳥取県">鳥取県</option><option value="島根県">島根県</option>
          <option value="岡山県">岡山県</option><option value="広島県">広島県</option>
          <option value="山口県">山口県</option><option value="徳島県">徳島県</option>
          <option value="香川県">香川県</option><option value="愛媛県">愛媛県</option>
          <option value="高知県">高知県</option><option value="福岡県">福岡県</option>
          <option value="佐賀県">佐賀県</option><option value="長崎県">長崎県</option>
          <option value="熊本県">熊本県</option><option value="大分県">大分県</option>
          <option value="宮崎県">宮崎県</option><option value="鹿児島県">鹿児島県</option>
          <option value="沖縄県">沖縄県</option>
        </select>

        <!-- 発注機関 -->
        <select id="ministry" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">すべての機関</option>
        </select>

        <!-- リセット -->
        <button onclick="reset()"
          class="border border-slate-200 hover:bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-sm transition">
          リセット
        </button>
      </div>
    </div>
  </div>

  <!-- 状態フィルタ & タグバー -->
  <div class="max-w-6xl mx-auto px-4 pt-4 space-y-2">
    <div id="status-bar" class="flex flex-wrap gap-2"></div>
    <div id="tag-bar" class="flex flex-wrap gap-1.5"></div>
    <div id="active-tag" class="hidden text-sm text-slate-500"></div>
  </div>

  <!-- 結果エリア -->
  <main class="max-w-6xl mx-auto px-4 py-5">
    <div id="result-summary" class="text-sm text-slate-400 mb-3"></div>
    <div id="results" class="space-y-3"></div>
    <div id="loading" class="hidden text-center py-14 text-slate-400">
      <div class="inline-block w-6 h-6 border-2 border-blue-400 border-t-transparent rounded-full animate-spin mb-3"></div>
      <p>読み込み中...</p>
    </div>
    <div id="no-results" class="hidden text-center py-14 text-slate-400">
      <p class="text-4xl mb-3">📭</p>
      <p>該当する案件が見つかりませんでした</p>
    </div>

    <!-- ページネーション -->
    <div id="pagination" class="flex justify-center gap-1.5 mt-8"></div>

    <!-- 注意書き -->
    <p class="mt-10 text-xs text-slate-400 leading-relaxed border-t border-slate-100 pt-4">
      ⚠️ 本サイトの情報は各機関の公開情報を自動収集・整形したものです。誤りや古い情報、リンク切れが含まれる場合があります。
      応募・正確な内容の確認は必ず各案件の掲載元（公式ページ）をご確認ください。
    </p>

    <div id="dev-link-wrap" class="hidden mt-4 text-right">
      <a href="/dev" class="text-xs text-slate-300 hover:text-slate-500">🛠️ 開発者ステータス</a>
    </div>
  </main>

  <script>
    let currentPage = 0;
    let currentTag = '';
    let currentStatus = '';
    const PAGE_SIZE = 20;

    function esc(s) {
      return (s == null ? '' : String(s))
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function toggleFilter() {
      const p = document.getElementById('filter-panel');
      p.classList.toggle('open');
    }

    const SOURCE_LABEL = { 'PORTAL': '調達ポータル', 'NEDO': 'NEDO', 'JST': 'JST', 'JOGMEC': 'JOGMEC' };
    function srcLabel(s) { return SOURCE_LABEL[s] || s || ''; }

    const SOURCE_COLOR = {
      'NEDO':   'bg-amber-50 text-amber-700 border-amber-200',
      'JST':    'bg-indigo-50 text-indigo-600 border-indigo-100',
      'JOGMEC': 'bg-amber-50 text-amber-700 border-amber-200',
      'PORTAL': 'bg-slate-50 text-slate-500 border-slate-200',
    };

    const STATUS_STYLE = {
      '募集中':     { cls: 'bg-emerald-50 text-emerald-700 border border-emerald-200', icon: '●' },
      '受付終了':   { cls: 'bg-slate-100 text-slate-400 border border-slate-200',     icon: '○' },
      '事業者決定': { cls: 'bg-indigo-50 text-indigo-600 border border-indigo-200',   icon: '✓' },
    };
    function statusBadge(status) {
      const s = STATUS_STYLE[status] || { cls: 'bg-slate-100 text-slate-500', icon: '' };
      return `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${s.cls} whitespace-nowrap">${s.icon} ${esc(status)}</span>`;
    }

    function deadlineStatus(deadline) {
      if (!deadline) return { label: '締切: 未定', cls: 'text-slate-400', badge: '' };
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const d = new Date(deadline + 'T00:00:00');
      const days = Math.round((d - today) / 86400000);
      if (days < 0) return { label: `締切: ${deadline}`, cls: 'text-slate-400', badge: '' };
      if (days === 0) return { label: `締切: ${deadline}`, cls: 'text-red-600 font-semibold', badge: `<span class="text-xs px-1.5 py-0.5 rounded-full bg-red-100 text-red-700 ml-1 font-bold">今日！</span>` };
      if (days <= 7) return { label: `締切: ${deadline}`, cls: 'text-red-600 font-semibold', badge: `<span class="text-xs px-1.5 py-0.5 rounded-full bg-red-100 text-red-700 ml-1">あと${days}日</span>` };
      if (days <= 14) return { label: `締切: ${deadline}`, cls: 'text-amber-600', badge: `<span class="text-xs px-1.5 py-0.5 rounded-full bg-amber-50 text-amber-600 ml-1">あと${days}日</span>` };
      return { label: `締切: ${deadline}`, cls: 'text-slate-600', badge: '' };
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();

      document.getElementById('stats-badge').innerHTML =
        `<div class="font-semibold">${data.total.toLocaleString()} 件</div>
         <div class="text-xs text-blue-200 mt-0.5">入札 ${data.nyusatsu} ／ プロポーザル ${data.proposal}</div>`;
      document.getElementById('stats-badge').classList.remove('hidden');

      // 状態フィルタ
      const sc = data.status || {};
      const statusBar = document.getElementById('status-bar');
      const btn = (label, count) => {
        const active = currentStatus === label;
        const base = label === '' ? 'すべて' : `${(STATUS_STYLE[label]||{}).icon||''} ${label}`;
        const cnt = label === '' ? data.total : (count || 0);
        return `<button onclick="filterByStatus('${label}')"
          class="text-sm px-3 py-1.5 rounded-lg border transition font-medium ${active ? 'status-btn-active shadow-sm' : 'status-btn'}">
          ${base} <span class="${active ? 'opacity-70' : 'text-slate-400'} text-xs font-normal">${cnt.toLocaleString()}</span></button>`;
      };
      statusBar.innerHTML =
        `<span class="text-xs text-slate-400 self-center mr-1">状態:</span>` +
        btn('', data.total) + btn('募集中', sc['募集中']) + btn('受付終了', sc['受付終了']) + btn('事業者決定', sc['事業者決定']);

      // タグバー
      const bar = document.getElementById('tag-bar');
      const tags = (data.tags || []).slice(0, 20);
      bar.innerHTML = tags.length
        ? `<span class="text-xs text-slate-400 self-center mr-1">タグ:</span>` +
          tags.map(t => `<button onclick="filterByTag('${esc(t.name)}')"
            class="text-xs px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-100 transition">#${esc(t.name)} <span class="text-indigo-300">${t.count}</span></button>`).join('')
        : '';

      // 発注機関プルダウン
      const msel = document.getElementById('ministry');
      if (msel && !msel.dataset.filled && (data.organizations || []).length) {
        const cur = msel.value;
        msel.innerHTML = '<option value="">すべての機関</option>' +
          data.organizations.map(o =>
            `<option value="${esc(o.name)}">${esc(o.name)}（${o.count}）</option>`).join('');
        msel.value = cur;
        msel.dataset.filled = '1';
      }

      const devWrap = document.getElementById('dev-link-wrap');
      if (devWrap && data.dev_link_visible) devWrap.classList.remove('hidden');
    }

    function filterByStatus(status) {
      currentStatus = (currentStatus === status) ? '' : status;
      loadStats();
      search(0);
    }

    function filterByTag(name) {
      currentTag = (currentTag === name) ? '' : name;
      const at = document.getElementById('active-tag');
      if (currentTag) {
        at.classList.remove('hidden');
        at.innerHTML = `絞り込み中: <span class="font-semibold text-indigo-600">#${esc(currentTag)}</span>
          <button onclick="filterByTag('${esc(currentTag)}')" class="ml-2 text-slate-400 hover:text-slate-600 underline text-xs">解除</button>`;
      } else {
        at.classList.add('hidden');
      }
      search(0);
    }

    async function search(page = 0) {
      currentPage = page;
      const q = document.getElementById('q').value;
      const category = document.getElementById('category').value;
      const prefecture = document.getElementById('prefecture').value;
      const ministry = document.getElementById('ministry').value;

      const params = new URLSearchParams({ skip: page * PAGE_SIZE, limit: PAGE_SIZE });
      if (q) params.append('q', q);
      if (category) params.append('category', category);
      if (prefecture) params.append('prefecture', prefecture);
      if (ministry) params.append('organization', ministry);
      if (currentTag) params.append('tag', currentTag);
      if (currentStatus) params.append('status', currentStatus);

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').innerHTML = '';
      document.getElementById('no-results').classList.add('hidden');

      const res = await fetch('/api/tenders?' + params);
      const data = await res.json();

      document.getElementById('loading').classList.add('hidden');

      if (data.items.length === 0) {
        document.getElementById('no-results').classList.remove('hidden');
        document.getElementById('result-summary').textContent = '';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      document.getElementById('result-summary').textContent =
        `${data.total.toLocaleString()}件中 ${page * PAGE_SIZE + 1}〜${Math.min((page + 1) * PAGE_SIZE, data.total)}件を表示`;

      document.getElementById('results').innerHTML = data.items.map(t => renderCard(t)).join('');
      renderPagination(data.total, page);
    }

    function renderCard(t) {
      const badgeClass = t.category === '入札' ? 'badge-nyusatsu'
        : t.category === 'RFI' ? 'badge-rfi'
        : t.category === '随意契約' ? 'badge-zuii'
        : 'badge-proposal';
      const ds = deadlineStatus(t.deadline);
      const srcColor = SOURCE_COLOR[t.source] || 'bg-slate-50 text-slate-500 border-slate-200';

      const awardeeHtml = t.awardee
        ? `<div class="mt-2 text-xs text-violet-700 font-medium">🏆 決定事業者: ${esc(t.awardee)}</div>` : '';
      const amountHtml = t.amount
        ? `<span class="text-xs text-slate-500 bg-slate-50 border border-slate-100 rounded px-1.5 py-0.5">💴 ${esc(t.amount)}</span>` : '';
      const tagsHtml = (t.tags && t.tags.length)
        ? `<div class="flex flex-wrap gap-1">${t.tags.map(tag =>
            `<span onclick="event.stopPropagation(); filterByTag('${esc(tag)}')"
                   class="cursor-pointer text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-100">#${esc(tag)}</span>`).join('')}</div>`
        : '';

      // AI要約
      const summaryHtml = t.summary
        ? `<div class="mt-3 summary-block rounded-lg px-3 py-2.5">
             <p class="text-xs text-indigo-400 font-medium mb-1 tracking-wide">✦ AI要約</p>
             <p class="text-sm text-slate-700 leading-relaxed summary-text">${esc(t.summary)}</p>
           </div>`
        : '';

      return `
        <div onclick="location.href='/tender/${t.id}'"
             class="bg-white border border-slate-200 rounded-2xl p-4 card-hover cursor-pointer">
          <div class="flex items-start gap-3">
            <div class="flex flex-col gap-1.5 mt-0.5 shrink-0">
              ${statusBadge(t.status)}
              <span class="text-center text-xs font-medium px-2 py-0.5 rounded-full ${badgeClass}">${esc(t.category)}</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-blue-700 font-semibold text-sm leading-snug">${esc(t.title.replace(/^【[^】]*】\s*/, ''))}</p>
              <div class="mt-2 flex flex-wrap gap-x-3 gap-y-1 items-center">
                <span class="text-xs text-slate-600 font-medium">🏢 ${esc(t.organization) || '—'}</span>
                ${t.published_at ? `<span class="text-xs text-slate-400">掲載: ${t.published_at}</span>` : ''}
                <span class="text-xs ${ds.cls}">${ds.label}${ds.badge}</span>
                ${(t.status === '事業者決定' && t.result_date) ? `<span class="text-xs text-violet-500">決定: ${t.result_date}</span>` : ''}
                ${amountHtml}
              </div>
              ${awardeeHtml}
              ${summaryHtml}
              ${tagsHtml ? `<div class="mt-2">${tagsHtml}</div>` : ''}
              <div class="mt-2 flex items-center justify-between">
                <span class="text-xs border ${srcColor} rounded px-1.5 py-0.5">${esc(srcLabel(t.source))}</span>
                <span class="text-xs text-slate-300">クリックで詳細 →</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderPagination(total, currentPage) {
      const totalPages = Math.ceil(total / PAGE_SIZE);
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

      let html = '';
      const start = Math.max(0, currentPage - 2);
      const end = Math.min(totalPages - 1, currentPage + 2);

      if (currentPage > 0)
        html += `<button onclick="search(${currentPage - 1})" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 transition">‹ 前</button>`;
      for (let i = start; i <= end; i++) {
        const active = i === currentPage
          ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
          : 'border-slate-200 hover:bg-slate-50';
        html += `<button onclick="search(${i})" class="px-3 py-1.5 border rounded-lg text-sm transition ${active}">${i + 1}</button>`;
      }
      if (currentPage < totalPages - 1)
        html += `<button onclick="search(${currentPage + 1})" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 transition">次 ›</button>`;

      document.getElementById('pagination').innerHTML = html;
    }

    function reset() {
      document.getElementById('q').value = '';
      document.getElementById('category').value = '';
      document.getElementById('prefecture').value = '';
      document.getElementById('ministry').value = '';
      currentTag = '';
      currentStatus = '';
      document.getElementById('active-tag').classList.add('hidden');
      loadStats();
      search();
    }

    (function init() {
      const params = new URLSearchParams(location.search);
      const tag = params.get('tag');
      const q = params.get('q');
      if (q) document.getElementById('q').value = q;
      loadStats();
      if (tag) {
        currentTag = tag;
        const at = document.getElementById('active-tag');
        at.classList.remove('hidden');
        at.innerHTML = `絞り込み中: <span class="font-semibold text-indigo-600">#${esc(currentTag)}</span>
          <button onclick="filterByTag('${esc(currentTag)}')" class="ml-2 text-slate-400 hover:text-slate-600 underline text-xs">解除</button>`;
      }
      search();
    })();
  </script>
</body>
</html>
