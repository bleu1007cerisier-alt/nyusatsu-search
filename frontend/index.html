<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入札・プロポーザル検索</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .badge-nyusatsu { background:#dbeafe; color:#1d4ed8; }
    .badge-proposal { background:#fce7f3; color:#9d174d; }
    .deadline-near { color:#dc2626; font-weight:600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-blue-700 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">🏛️ 入札・プロポーザル検索</h1>
        <p class="text-blue-200 text-sm mt-0.5">日本全国の官公庁・自治体の公募情報を一元検索</p>
      </div>
      <div id="stats-badge" class="text-right text-sm text-blue-100"></div>
    </div>
  </header>

  <!-- 検索エリア -->
  <div class="bg-white border-b shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex flex-wrap gap-3">
        <!-- キーワード -->
        <input id="q" type="text" placeholder="キーワード（例：システム開発、道路工事、委託）"
          class="flex-1 min-w-60 border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          onkeydown="if(event.key==='Enter') search()">

        <!-- 種別 -->
        <select id="category" class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">すべての種別</option>
          <option value="入札">入札</option>
          <option value="プロポーザル">プロポーザル</option>
        </select>

        <!-- 都道府県 -->
        <select id="prefecture" class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">すべての地域</option>
          <option value="国">国（省庁）</option>
          <option value="北海道">北海道</option>
          <option value="青森県">青森県</option>
          <option value="岩手県">岩手県</option>
          <option value="宮城県">宮城県</option>
          <option value="秋田県">秋田県</option>
          <option value="山形県">山形県</option>
          <option value="福島県">福島県</option>
          <option value="茨城県">茨城県</option>
          <option value="栃木県">栃木県</option>
          <option value="群馬県">群馬県</option>
          <option value="埼玉県">埼玉県</option>
          <option value="千葉県">千葉県</option>
          <option value="東京都">東京都</option>
          <option value="神奈川県">神奈川県</option>
          <option value="新潟県">新潟県</option>
          <option value="富山県">富山県</option>
          <option value="石川県">石川県</option>
          <option value="福井県">福井県</option>
          <option value="山梨県">山梨県</option>
          <option value="長野県">長野県</option>
          <option value="岐阜県">岐阜県</option>
          <option value="静岡県">静岡県</option>
          <option value="愛知県">愛知県</option>
          <option value="三重県">三重県</option>
          <option value="滋賀県">滋賀県</option>
          <option value="京都府">京都府</option>
          <option value="大阪府">大阪府</option>
          <option value="兵庫県">兵庫県</option>
          <option value="奈良県">奈良県</option>
          <option value="和歌山県">和歌山県</option>
          <option value="鳥取県">鳥取県</option>
          <option value="島根県">島根県</option>
          <option value="岡山県">岡山県</option>
          <option value="広島県">広島県</option>
          <option value="山口県">山口県</option>
          <option value="徳島県">徳島県</option>
          <option value="香川県">香川県</option>
          <option value="愛媛県">愛媛県</option>
          <option value="高知県">高知県</option>
          <option value="福岡県">福岡県</option>
          <option value="佐賀県">佐賀県</option>
          <option value="長崎県">長崎県</option>
          <option value="熊本県">熊本県</option>
          <option value="大分県">大分県</option>
          <option value="宮崎県">宮崎県</option>
          <option value="鹿児島県">鹿児島県</option>
          <option value="沖縄県">沖縄県</option>
        </select>

        <!-- 検索ボタン -->
        <button onclick="search()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition">
          🔍 検索
        </button>

        <!-- リセット -->
        <button onclick="reset()"
          class="border border-gray-300 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-lg text-sm transition">
          リセット
        </button>
      </div>
    </div>
  </div>

  <!-- 状態フィルタ -->
  <div class="max-w-6xl mx-auto px-4 pt-4">
    <div id="status-bar" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- タグバー -->
  <div class="max-w-6xl mx-auto px-4 pt-3">
    <div id="tag-bar" class="flex flex-wrap gap-2"></div>
    <div id="active-tag" class="hidden mt-2 text-sm"></div>
  </div>

  <!-- 結果エリア -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div id="result-summary" class="text-sm text-gray-500 mb-4"></div>
    <div id="results" class="space-y-3"></div>
    <div id="loading" class="hidden text-center py-10 text-gray-400">読み込み中...</div>
    <div id="no-results" class="hidden text-center py-10 text-gray-400">
      <p class="text-4xl mb-2">📭</p>
      <p>該当する案件が見つかりませんでした</p>
    </div>

    <!-- ページネーション -->
    <div id="pagination" class="flex justify-center gap-2 mt-8"></div>
  </main>


  <script>
    let currentPage = 0;
    let currentTag = '';
    let currentStatus = '';
    const PAGE_SIZE = 20;

    function esc(s) {
      return (s == null ? '' : String(s))
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // 状態（募集中／受付終了／事業者決定）の見た目
    const STATUS_STYLE = {
      '募集中':   { cls: 'bg-green-100 text-green-700', icon: '🟢' },
      '受付終了': { cls: 'bg-gray-200 text-gray-600',   icon: '⚪' },
      '事業者決定': { cls: 'bg-purple-100 text-purple-700', icon: '🟣' },
    };
    function statusBadge(status) {
      const s = STATUS_STYLE[status] || { cls: 'bg-gray-100 text-gray-600', icon: '' };
      return `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${s.cls} whitespace-nowrap">${s.icon} ${esc(status)}</span>`;
    }

    // 締切日の状態を返す（受付終了 / 締切間近 / 通常）
    function deadlineStatus(deadline) {
      if (!deadline) return { label: '締切: 未定', cls: 'text-gray-400', badge: '' };
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const d = new Date(deadline + 'T00:00:00');
      const days = Math.round((d - today) / 86400000);
      if (days < 0) return { label: `締切: ${deadline}`, cls: 'text-gray-400', badge: '' };
      if (days <= 7) return { label: `締切: ${deadline}`, cls: 'text-red-600 font-semibold', badge: `<span class="text-xs px-1.5 py-0.5 rounded bg-red-100 text-red-700 ml-1">あと${days}日</span>` };
      return { label: `締切: ${deadline}`, cls: 'text-gray-700', badge: '' };
    }

    function tagChip(name, onclick) {
      return `<button onclick="${onclick}" class="text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-100 transition">#${esc(name)}</button>`;
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stats-badge').innerHTML =
        `<div>総件数: <strong>${data.total.toLocaleString()}</strong>件</div>
         <div class="text-xs mt-0.5">入札 ${data.nyusatsu}件 ／ プロポーザル ${data.proposal}件</div>`;

      // 状態フィルタ（件数つき）
      const sc = data.status || {};
      const statusBar = document.getElementById('status-bar');
      const btn = (label, count) => {
        const active = currentStatus === label;
        const base = label === '' ? 'すべて' : `${(STATUS_STYLE[label]||{}).icon||''} ${label}`;
        const cnt = (label === '' ? data.total : (count || 0));
        return `<button onclick="filterByStatus('${label}')"
          class="text-sm px-3 py-1.5 rounded-lg border transition ${active ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 hover:bg-gray-50 border-gray-300'}">
          ${base} <span class="${active ? 'text-blue-100' : 'text-gray-400'}">${cnt}</span></button>`;
      };
      statusBar.innerHTML =
        `<span class="text-xs text-gray-400 self-center mr-1">状態:</span>` +
        btn('', data.total) + btn('募集中', sc['募集中']) + btn('受付終了', sc['受付終了']) + btn('事業者決定', sc['事業者決定']);

      // タグバー（件数の多い上位を表示）
      const bar = document.getElementById('tag-bar');
      const tags = (data.tags || []).slice(0, 20);
      bar.innerHTML = tags.length
        ? `<span class="text-xs text-gray-400 self-center mr-1">タグで絞り込み:</span>` +
          tags.map(t => `<button onclick="filterByTag('${esc(t.name)}')" class="text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-100 transition">#${esc(t.name)} <span class="text-indigo-400">${t.count}</span></button>`).join('')
        : '';
    }

    function filterByStatus(status) {
      currentStatus = (currentStatus === status) ? '' : status;
      loadStats();   // ボタンのハイライト更新
      search(0);
    }

    function filterByTag(name) {
      currentTag = (currentTag === name) ? '' : name;
      const at = document.getElementById('active-tag');
      if (currentTag) {
        at.classList.remove('hidden');
        at.innerHTML = `絞り込み中: <span class="font-semibold text-indigo-700">#${esc(currentTag)}</span> <button onclick="filterByTag('${esc(currentTag)}')" class="ml-1 text-gray-400 hover:text-gray-700 underline">解除</button>`;
      } else {
        at.classList.add('hidden');
        at.innerHTML = '';
      }
      search(0);
    }

    async function search(page = 0) {
      currentPage = page;
      const q = document.getElementById('q').value;
      const category = document.getElementById('category').value;
      const prefecture = document.getElementById('prefecture').value;

      const params = new URLSearchParams({
        skip: page * PAGE_SIZE,
        limit: PAGE_SIZE,
      });
      if (q) params.append('q', q);
      if (category) params.append('category', category);
      if (prefecture) params.append('prefecture', prefecture);
      if (currentTag) params.append('tag', currentTag);
      if (currentStatus) params.append('status', currentStatus);

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').innerHTML = '';
      document.getElementById('no-results').classList.add('hidden');

      const res = await fetch('/api/tenders?' + params);
      const data = await res.json();

      document.getElementById('loading').classList.add('hidden');

      if (data.items.length === 0) {
        document.getElementById('no-results').classList.remove('hidden');
        document.getElementById('result-summary').textContent = '';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      document.getElementById('result-summary').textContent =
        `${data.total.toLocaleString()}件中 ${page * PAGE_SIZE + 1}〜${Math.min((page + 1) * PAGE_SIZE, data.total)}件を表示`;

      const container = document.getElementById('results');
      container.innerHTML = data.items.map(t => renderCard(t)).join('');

      renderPagination(data.total, page);
    }

    function renderCard(t) {
      const badgeClass = t.category === '入札' ? 'badge-nyusatsu' : 'badge-proposal';
      const ds = deadlineStatus(t.deadline);
      const pubHtml = t.published_at
        ? `<span class="text-xs text-gray-500">掲載日: ${t.published_at}</span>` : '';
      // 締切表示（事業者決定の場合は結果日も併記）
      const resultHtml = (t.status === '事業者決定' && t.result_date)
        ? `<span class="text-xs text-purple-600">事業者決定: ${t.result_date}</span>` : '';
      const dlHtml = `<span class="text-xs ${ds.cls}">${ds.label}${ds.badge}</span>`;
      const amountHtml = t.amount
        ? `<span class="text-xs text-gray-500">予定価格: ${esc(t.amount)}</span>` : '';
      const tagsHtml = (t.tags && t.tags.length)
        ? `<div class="mt-2 flex flex-wrap gap-1.5">${t.tags.map(tag =>
            `<span onclick="event.stopPropagation(); filterByTag('${esc(tag)}')"
                   class="cursor-pointer text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-100">#${esc(tag)}</span>`).join('')}</div>`
        : '';

      return `
        <div onclick="location.href='/tender/${t.id}'"
             class="bg-white border rounded-xl p-4 hover:shadow-md hover:border-blue-300 transition cursor-pointer">
          <div class="flex items-start gap-3">
            <div class="flex flex-col gap-1 mt-0.5 shrink-0">
              ${statusBadge(t.status)}
              <span class="inline-block text-center text-xs font-medium px-2 py-0.5 rounded-full ${badgeClass} whitespace-nowrap">${esc(t.category)}</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-blue-700 font-medium text-sm leading-snug">${esc(t.title)}</p>
              <div class="mt-1.5 flex flex-wrap gap-x-4 gap-y-1 items-center">
                <span class="text-xs text-gray-600">🏢 ${esc(t.organization) || '—'}</span>
                <span class="text-xs text-gray-400">${esc(t.prefecture) || ''}</span>
                ${pubHtml}
                ${dlHtml}
                ${resultHtml}
                ${amountHtml}
              </div>
              ${t.summary ? `<p class="text-xs text-gray-500 mt-1.5 line-clamp-2">${esc(t.summary)}</p>` : ''}
              ${tagsHtml}
              <div class="mt-1.5">
                <span class="text-xs text-gray-300">出典: ${esc(t.source)} ・ クリックで詳細</span>
              </div>
            </div>
          </div>
        </div>`;
    }


    function renderPagination(total, currentPage) {
      const totalPages = Math.ceil(total / PAGE_SIZE);
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

      let html = '';
      const start = Math.max(0, currentPage - 2);
      const end = Math.min(totalPages - 1, currentPage + 2);

      if (currentPage > 0)
        html += `<button onclick="search(${currentPage - 1})" class="px-3 py-1 border rounded text-sm hover:bg-gray-100">‹ 前</button>`;

      for (let i = start; i <= end; i++) {
        const active = i === currentPage ? 'bg-blue-600 text-white' : 'hover:bg-gray-100';
        html += `<button onclick="search(${i})" class="px-3 py-1 border rounded text-sm ${active}">${i + 1}</button>`;
      }

      if (currentPage < totalPages - 1)
        html += `<button onclick="search(${currentPage + 1})" class="px-3 py-1 border rounded text-sm hover:bg-gray-100">次 ›</button>`;

      document.getElementById('pagination').innerHTML = html;
    }

    function reset() {
      document.getElementById('q').value = '';
      document.getElementById('category').value = '';
      document.getElementById('prefecture').value = '';
      currentTag = '';
      currentStatus = '';
      document.getElementById('active-tag').classList.add('hidden');
      loadStats();
      search();
    }

    // 初期表示（詳細ページ等から ?tag= で来た場合はそのタグで絞り込む）
    (function init() {
      const params = new URLSearchParams(location.search);
      const tag = params.get('tag');
      const q = params.get('q');
      if (q) document.getElementById('q').value = q;
      loadStats();
      if (tag) {
        currentTag = tag;
        const at = document.getElementById('active-tag');
        at.classList.remove('hidden');
        at.innerHTML = `絞り込み中: <span class="font-semibold text-indigo-700">#${esc(currentTag)}</span> <button onclick="filterByTag('${esc(currentTag)}')" class="ml-1 text-gray-400 hover:text-gray-700 underline">解除</button>`;
      }
      search();
    })();
  </script>
</body>
</html>
